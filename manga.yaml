description: My School's Haimiya-Senpai is feared of, and considered Scary. It might be because of her intimidating appearance and her blunt way of speaking... and those sparkling piercings! Long gray-wolf cut hair!! And her intimidating Kansai dialect!!! But for some reason, this Scary Senpai treats me kindly-!? "Scary" turns into "Cute". A Scary Heart-Fluttering Senpai Romcom Begins!
